<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 700" shape-rendering="geometricPrecision">
<defs>
  <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#0D3320"/><stop offset="100%" stop-color="#1A5E40"/></linearGradient>
  <linearGradient id="fairwayGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#4CAF74"/><stop offset="100%" stop-color="#3D9660"/></linearGradient>
  <linearGradient id="waterGrad" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#2B85C8"/><stop offset="100%" stop-color="#1A5E96"/></linearGradient>
  <linearGradient id="waterGrad2" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#3490C8"/><stop offset="100%" stop-color="#205A8A"/></linearGradient>
  <linearGradient id="greenGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#5DC880"/><stop offset="100%" stop-color="#44A062"/></linearGradient>
  <linearGradient id="clubGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#C9A84C"/><stop offset="100%" stop-color="#8B6914"/></linearGradient>
  <filter id="glow"><feGaussianBlur stdDeviation="2" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  <filter id="softblur"><feGaussianBlur stdDeviation="3"/></filter>
  <filter id="lightshadow"><feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.3"/></filter>
</defs>

<!-- ═══════════════ BACKGROUND TERRAIN ═══════════════ -->
<rect width="500" height="700" fill="url(#sky)"/>

<!-- Terrain variation -->
<ellipse cx="80"  cy="100" rx="90"  ry="70"  fill="#0F3D24" opacity=".5"/>
<ellipse cx="420" cy="120" rx="75"  ry="60"  fill="#0F3D24" opacity=".5"/>
<ellipse cx="50"  cy="320" rx="65"  ry="100" fill="#0F3D24" opacity=".5"/>
<ellipse cx="455" cy="300" rx="55"  ry="90"  fill="#0F3D24" opacity=".5"/>
<ellipse cx="80"  cy="580" rx="80"  ry="70"  fill="#0F3D24" opacity=".5"/>
<ellipse cx="430" cy="560" rx="70"  ry="75"  fill="#0F3D24" opacity=".5"/>
<ellipse cx="250" cy="680" rx="120" ry="50"  fill="#0F3D24" opacity=".4"/>

